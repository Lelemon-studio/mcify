# Auto-deploy your mcify server to Railway on every push to main.
# Required repo secret:
#   - RAILWAY_TOKEN  (project-scoped token from Railway dashboard → Settings)

name: Deploy MCP server (Railway)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Test
        run: pnpm test --if-present

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: pnpm exec mcify deploy railway
