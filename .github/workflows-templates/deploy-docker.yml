# Build a Docker image and push to GHCR on every push to main.
# No extra secrets needed — uses the auto-provided GITHUB_TOKEN.
#
# After this lands an image at ghcr.io/<owner>/<repo>:<tag>, your
# Kubernetes / VPS / Cloud Run / wherever pulls from there.

name: Build and push Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test --if-present

      - name: Build mcify Node bundle
        run: pnpm exec mcify build --target node

      - name: Generate Dockerfile.mcify (dry-run, just the file)
        run: pnpm exec mcify deploy docker --dry-run --tag placeholder:tag

      - name: Build + push image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcify
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
