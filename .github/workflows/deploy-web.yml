name: Deploy web

on:
  # Every push to main redeploys. We previously had a `paths:` filter
  # restricting this to `apps/web/**`, but that meant a failed deploy
  # never re-ran on the next non-web commit — prod could lag head silently.
  # The build is ~3s; cost of always running is negligible vs the cost of
  # a stale prod.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter mcify-web build
        env:
          # Public env vars baked into the static bundle.
          PUBLIC_TURNSTILE_SITEKEY: ${{ vars.TURNSTILE_SITEKEY }}
          PUBLIC_CF_WEB_ANALYTICS_TOKEN: ${{ vars.CF_WEB_ANALYTICS_TOKEN }}

      - name: Deploy to Cloudflare Pages
        # We invoke wrangler directly via pnpm rather than cloudflare/wrangler-action
        # because the action's auto-install path doesn't play with pnpm workspaces
        # (it does `pnpm add wrangler` at the root which trips ERR_PNPM_ADDING_TO_ROOT).
        # wrangler is a devDep of @mcify/web so `pnpm --filter` finds it.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # `--commit-message` uses the SHA so non-ASCII commit messages don't blow
        # up Cloudflare with error 8000111 (we hit this on lelemon-app).
        run: |
          pnpm --filter mcify-web exec wrangler pages deploy dist \
            --project-name mcify-web \
            --branch main \
            --commit-message "${{ github.sha }}"
