name: Deploy docs

on:
  # Every push to main redeploys (no paths filter). See deploy-web.yml for
  # the rationale: the failed-deploy / stale-prod risk outweighs the small
  # build-time cost.
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build + Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter mcify-docs build

      - name: Deploy to Cloudflare Pages
        # Invoke wrangler via pnpm (it's a devDep of mcify-docs) — the
        # cloudflare/wrangler-action auto-install path doesn't play with
        # pnpm workspaces. Same approach as deploy-web.yml.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm --filter mcify-docs exec wrangler pages deploy dist \
            --project-name mcify-docs \
            --branch main \
            --commit-message "${{ github.sha }}"
