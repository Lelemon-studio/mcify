{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcify.fullname" . }}
  labels:
    {{- include "mcify.labels" . | nindent 4 }}
  annotations:
    # Plaintext secrets in values.yaml are dev-only — for production, set
    # `secret.create=false` and reference an externally-managed Secret via
    # `secret.existing` (sops, external-secrets, Vault Agent, etc.).
    helm.sh/hook-weight: "-5"
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
